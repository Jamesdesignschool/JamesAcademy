<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Three.js Teapot Load</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f0f0; }
        canvas { display: block; }

        /* 1. 상단 top.html을 띄울 컨테이너 추가 */
        #top-header {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 1000px;
            height: 70px;
            z-index: 1000;
        }
        #top-header iframe { width: 100%; height: 100%; border: none; }

        /* 팝업 레이어 스타일 */
        #mail-modal {
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 2000; 
            background: rgba(0,0,0,0.5);
        }
        .modal-content {
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 1280px; 
            height: 700px; 
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <!-- 상단 영역 추가됨 -->
    <div id="top-header">
        <iframe src="top.html"></iframe>
    </div>

    <!-- 팝업 레이어 -->
    <div id="mail-modal">
        <div class="modal-content">
            <button onclick="closeMail()" style="position:absolute; right:20px; top:20px; cursor:pointer;">X</button>
            <iframe id="mail-frame" src="" style="width:100%; height:100%; border:none;"></iframe>
        </div>
    </div>

    <script>
        function openMail(url) {
            document.getElementById('mail-frame').src = url;
            document.getElementById('mail-modal').style.display = 'block';
        }

        function closeMail() {
            document.getElementById('mail-modal').style.display = 'none';
            document.getElementById('mail-frame').src = ''; // 닫을 때는 비워줍니다.
        }
    </script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <!-- <script type="module" src="js/load3d.js"></script> -->
</body>
</html>
