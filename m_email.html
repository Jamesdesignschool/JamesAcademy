<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmailJS Form</title>

    <!-- EmailJS 로드 -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function(){
            emailjs.init("5lqKgSQFcwTUHfSR0"); // 사용자님의 Public Key
        })();
    </script>

    <style>
        /* 이미지와 유사한 다크 모드 스타일링 */
        body {
            background-color: #ffffff; /* 배경색 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        .container {
            width: 100%;
            max-width: 380px;
            text-align: center;
            color: #111; /* 텍스트 색상 */
        }

        .input-group {
            margin-bottom: 30px;
        }

        .input-group label {
            display: block;
            font-size:20px;

            margin-bottom: 10px;
            font-weight: bold;
        }

        input[type="email"], textarea {										/* 이메일 텍스트 */

            width: 100%;
			font-size:22px;
            background-color: #ffffff; /* 입력창 배경 */
            border: 1px solid #bababa;
            padding: 10px;
            color: rgb(0, 0, 0);
            box-sizing: border-box;
        }

        input[type="email"] {												/* 이메일 박스 크기 */
            height: 34px;
        }

        textarea {
			font-family: "Malgun Gothic", "맑은 고딕", sans-serif;
            font-size: 22px; /* 글자 크기도 조절하면 더 보기 좋습니다 */
            height: 200px;
            resize: none;
        }

        .submit-btn {
            background-color: #ffbb00; /* 오렌지색 버튼 */
            border: none;
            color: black;
            padding: 4px 30px;
            border-radius: 25px; /* 둥근 버튼 */
            font-size: 22px;
            cursor: pointer;
            /* font-weight: bold; */
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #e68a00;
        }
    </style>
</head>
<body>

<div class="container">
    <form id="contact-form">
        <div class="input-group">
            <label>본인 이메일</label>
            <input type="email" name="user_email" required>
        </div>

        <div class="input-group">
            <label>상담 내용</label>
            <textarea name="message" required></textarea>
        </div>

        <button type="submit" class="submit-btn">보내기</button>
    </form>
</div>

<script>


    
</script>


<script type="text/javascript">
document.getElementById('contact-form').addEventListener('submit', function(event) {
    event.preventDefault();

    const serviceID = 'service_q1ndxzq'; 
    const myTemplate = 'template_xp4e8k4'; // 나에게 오는 문의 알림 템플릿

    // 1. 메일 전송 (대시보드 설정에 의해 자동 응답은 서버에서 처리됨)
    emailjs.sendForm(serviceID, myTemplate, this)
        .then(() => {
            // 2. 전송 성공 시 알림창 표시
            alert('문의가 접수되었습니다. 확인 메일을 보냈으니 확인해 주세요!');
            
            // 폼 입력 내용 초기화
            document.getElementById('contact-form').reset();
        })
        .catch((err) => {
            // 전송 실패 시 에러 메시지 표시
            alert('전송 중 오류가 발생했습니다: ' + JSON.stringify(err));
            console.error('FAILED...', err);
        });
});




</script>

</body>
</html>
